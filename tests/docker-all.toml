# Combined MySQL + Oracle + GaussDB config for multi-backend regression testing
# Usage:
#   cargo run --features "oracle,gaussdb" -- --config tests/docker-all.toml cli --sql "..." --name gaussdb

default_connection = "mysql"

[connections.mysql]
host = "127.0.0.1"
port = 3306
user = "root"
password = "testpass"
database = "testdb"

[connections.oracle]
driver = "oracle"
host = "127.0.0.1"
port = 1521
user = "system"
password = "testpass"
database = "FREEPDB1"

[connections.gaussdb]
driver = "gaussdb"
host = "127.0.0.1"
port = 5432
user = "gaussdb"
password = "testpass@123"
database = "testdb"
sslmode = "disable"
