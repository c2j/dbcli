[build]

[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:main-centos"
pre-build = [
    "yum install -y dbus-devel pkgconfig",
]

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update",
    "apt-get install -y --no-install-recommends libdbus-1-dev:arm64 pkg-config wget",
    "wget -q http://ports.ubuntu.com/ubuntu-ports/pool/main/g/glibc/libc6_2.31-0ubuntu9_arm64.deb -O /tmp/libc6.deb",
    "wget -q http://ports.ubuntu.com/ubuntu-ports/pool/main/g/glibc/libc6-dev_2.31-0ubuntu9_arm64.deb -O /tmp/libc6-dev.deb",
    "dpkg -x /tmp/libc6.deb /tmp/glibc231",
    "dpkg -x /tmp/libc6-dev.deb /tmp/glibc231-dev",
    "cp -a /tmp/glibc231/lib/aarch64-linux-gnu/* /usr/aarch64-linux-gnu/lib/",
    "cp -a /tmp/glibc231-dev/usr/include/* /usr/aarch64-linux-gnu/include/",
    "cp -a /tmp/glibc231-dev/usr/lib/aarch64-linux-gnu/* /usr/aarch64-linux-gnu/lib/",
]
