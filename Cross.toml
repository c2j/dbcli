[build]

[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:centos"
pre-build = [
    "yum install -y dbus-devel pkgconfig",
]

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:centos"
pre-build = [
    "yum install -y dbus-devel",
]
