name: Release Build

on:
  push:
    tags:
      - "v*"
      - "polar-mysql-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 0.1.0)"
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: polar-mysql

jobs:
  build-linux:
    name: Build linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - run: cargo build --release -p polar-mysql
      - run: strip target/release/${{ env.BINARY_NAME }}
      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#polar-mysql-v}"
          VERSION="${VERSION#v}"
          [ -n "${{ inputs.version }}" ] && VERSION="${{ inputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT_NAME="${{ env.BINARY_NAME }}-${VERSION}-x86_64-unknown-linux-gnu"
          mkdir -p "${ARTIFACT_NAME}"
          cp "target/release/${{ env.BINARY_NAME }}" "${ARTIFACT_NAME}/"
          zip -r "${ARTIFACT_NAME}.zip" "${ARTIFACT_NAME}"
      - uses: actions/upload-artifact@v4
        with:
          name: polar-mysql-linux-x86_64
          path: "*.zip"

  build-linux-arm64:
    name: Build linux-arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - run: cargo build --release -p polar-mysql
      - run: strip target/release/${{ env.BINARY_NAME }}
      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#polar-mysql-v}"
          VERSION="${VERSION#v}"
          [ -n "${{ inputs.version }}" ] && VERSION="${{ inputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT_NAME="${{ env.BINARY_NAME }}-${VERSION}-aarch64-unknown-linux-gnu"
          mkdir -p "${ARTIFACT_NAME}"
          cp "target/release/${{ env.BINARY_NAME }}" "${ARTIFACT_NAME}/"
          zip -r "${ARTIFACT_NAME}.zip" "${ARTIFACT_NAME}"
      - uses: actions/upload-artifact@v4
        with:
          name: polar-mysql-linux-arm64
          path: "*.zip"

  build-windows:
    name: Build windows-x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - run: cargo build --release -p polar-mysql --target x86_64-pc-windows-msvc
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#polar-mysql-v}"
          VERSION="${VERSION#v}"
          [ -n "${{ inputs.version }}" ] && VERSION="${{ inputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Package
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $ARTIFACT_NAME = "${{ env.BINARY_NAME }}-${VERSION}-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Force -Path $ARTIFACT_NAME
          Copy-Item "target/x86_64-pc-windows-msvc/release/${{ env.BINARY_NAME }}.exe" -Destination $ARTIFACT_NAME
          Compress-Archive -Path $ARTIFACT_NAME -DestinationPath "${ARTIFACT_NAME}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: polar-mysql-windows-x86_64
          path: "*.zip"

  release:
    name: Create GitHub Release
    needs: [build-linux, build-linux-arm64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          shopt -s nullglob
          FILES=(*.zip)
          if [ ${#FILES[@]} -gt 0 ]; then
            sha256sum "${FILES[@]}" > ../SHA256SUMS.txt
          fi
      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="polar-mysql-v${{ inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            SHA256SUMS.txt
